<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zeno Brand Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E2DDD5;
    --text: #1C1A17;
    --text-muted: #7A7469;
    --accent: #3D5A3E;
    --accent-light: #EAF2EA;
    --accent-text: #2A3E2B;
    --user-bg: #3D5A3E;
    --user-text: #F7F5F0;
    --tag-bg: #F0EDE6;
    --tag-border: #D4CEC4;
    --tag-text: #5A5349;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .chat-container {
    width: 100%;
    max-width: 520px;
    height: 680px;
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }

  /* Header */
  .header {
    padding: 18px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-mark {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: #fff;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }

  .header-info .title {
    font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2;
  }
  .header-info .sub {
    font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px;
  }
  .online-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #4CAF50;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-row {
    display: flex;
    gap: 8px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--accent-text);
    flex-shrink: 0; align-self: flex-end;
  }
  .msg-row.user .msg-avatar {
    background: var(--surface2); color: var(--text-muted);
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    font-size: 14px; line-height: 1.6;
    color: var(--text);
    background: var(--surface2);
    border-radius: 16px 16px 16px 4px;
    border: 1px solid var(--border);
  }

  .msg-row.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-color: var(--user-bg);
    border-radius: 16px 16px 4px 16px;
  }

  /* Typing */
  .typing-bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 18px;
  }
  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    animation: blink 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,60%,100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Suggestions */
  .suggestions {
    padding: 0 16px 10px;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .chip {
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--tag-border);
    background: var(--tag-bg);
    color: var(--tag-text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  /* Input */
  .input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    background: var(--surface);
  }

  #user-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: var(--accent); background: var(--surface); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.88; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .powered {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 0 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="brand-mark">ZN</div>
    <div class="header-info">
      <div class="title">Zeno Brand Guide</div>
      <div class="sub"><span class="online-dot"></span> Ask me anything about Zeno</div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <span class="chip" onclick="sendChip(this)">What is Zeno?</span>
    <span class="chip" onclick="sendChip(this)">Brand values</span>
    <span class="chip" onclick="sendChip(this)">Target audience</span>
    <span class="chip" onclick="sendChip(this)">Visual identity</span>
    <span class="chip" onclick="sendChip(this)">Key products</span>
    <span class="chip" onclick="sendChip(this)">Tone of voice</span>
  </div>

  <div class="input-area">
    <input id="user-input" type="text" placeholder="Ask about Zeno…" onkeydown="if(event.key==='Enter' && !event.shiftKey) sendMsg()" />
    <button id="send-btn" onclick="sendMsg()">Send</button>
  </div>

  <div class="powered">powered by Claude AI</div>
</div>

<script>
const BRAND_CONTEXT = `You are a helpful brand guide chatbot for "Zeno" — a sub-brand of a larger company focused on sustainable, tech-forward lifestyle products for urban professionals aged 25–40.

Key brand facts:
- Brand name: Zeno
- Tagline: "Live forward."
- Parent company: Apex Group
- Launch year: 2022
- Mission: Make sustainable living effortless and stylish for the modern urbanite.
- Brand values: Sustainability, Innovation, Minimalism, Accessibility
- Target audience: Urban professionals, 25–40, eco-conscious, digitally native
- Visual identity: Clean lines, muted earth tones (sage green, warm sand, charcoal), sans-serif typography, whitespace-forward design
- Product categories: Smart home accessories, eco-apparel, wellness tech, urban mobility gear
- Hero products: Zeno Air Purifier Mini, Zeno Commuter Pack (recycled materials), Zeno Focus Band (wellness wearable)
- Tone of voice: Warm, direct, optimistic — never preachy about sustainability
- Differentiator: Zeno partners only with certified B-Corp suppliers and uses 100% recycled or biodegradable packaging
- Price positioning: Premium but accessible (mid-to-upper range)
- Channels: DTC website, select retail partners, corporate wellness programs
- Awards: 2023 Red Dot Design Award (Zeno Air Purifier Mini), Fast Company "World Changing Ideas" 2024

Answer learner questions about Zeno clearly and helpfully. Keep answers concise (2–4 sentences). If asked something outside the brand scope, gently redirect back to Zeno topics.`;

const history = [];

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const initials = role === 'bot' ? 'ZN' : 'Me';
  row.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div class="bubble">${text}</div>
  `;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = `<div class="msg-avatar">ZN</div><div class="bubble typing-bubble"><span></span><span></span><span></span></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMsg() {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  btn.disabled = true;
  document.getElementById('suggestions').style.display = 'none';

  addMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
   headers: {
  'Content-Type': 'application/json',
  'x-api-key': 'YOUR_API_KEY_HERE',
  'anthropic-version': '2023-06-01'
},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: BRAND_CONTEXT,
        messages: history
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || "I'm not sure — please try rephrasing!";
    removeTyping();
    addMsg('bot', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping();
    addMsg('bot', 'Something went wrong. Please check your connection and try again.');
  }

  btn.disabled = false;
  input.focus();
}

function sendChip(el) {
  document.getElementById('user-input').value = el.textContent;
  sendMsg();
}

// Welcome message
addMsg('bot', "Hi! I'm your Zeno brand guide. Ask me anything about the Zeno brand — our values, products, visual identity, tone of voice, and more. How can I help you?");
</script>
</body>
</html>
